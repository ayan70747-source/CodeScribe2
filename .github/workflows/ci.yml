name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          GEMINI_API_KEY: ci-placeholder
          FLASK_SECRET_KEY: ci-secret
          APP_ADMIN_USERNAME: ci-admin
          APP_ADMIN_PASSWORD_HASH: pbkdf2:sha256:600000$ci$58ea89a6d4f6b9d4af95f537f3fed43b9f188f6f0f617c2c894df7ef95d8f2c7
          CORS_ALLOWED_ORIGINS: http://localhost:8080
        run: pytest -q

      - name: Dependency vulnerability scan
        run: |
          pip-audit \
            --ignore-vuln GHSA-4xh5-x5gv-qwph \
            --ignore-vuln GHSA-6vgw-5pg2-w6jp \
            --ignore-vuln GHSA-7gcm-g887-7qv7
